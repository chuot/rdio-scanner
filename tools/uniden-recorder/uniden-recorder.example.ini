; Uniden BCD996XT companion recorder for rdio-scanner.
;
; Copy this file to uniden-recorder.ini (next to the script, or in
; /etc/uniden-recorder.ini for the systemd unit) and tweak.
;
; Discover values:
;   python3 uniden_recorder.py --list-serial
;   python3 uniden_recorder.py --list-audio

[uniden]
; ---- Serial link to the scanner ----
; USB serial port the scanner enumerates as. On Raspberry Pi OS it's almost
; always /dev/ttyUSB0; if you have other USB-serial devices plugged in you
; may need /dev/ttyUSB1 etc. (Use --list-serial.)
serial_port = /dev/ttyUSB0
serial_baud = 115200

; How often to poll the scanner with `GLG`. 5 Hz is enough to catch short
; transmissions; higher rates only add CPU without much benefit because the
; scanner itself updates GLG roughly that fast.
poll_hz = 5

; ---- Audio capture ----
; Either a substring of the device name (e.g. "USB Audio") or a numeric
; index. Run --list-audio to inspect. Leave blank to use the system default
; (you almost never want that on the Pi).
audio_device = USB Audio

samplerate = 22050
channels = 1
blocksize = 1024

; How much audio (ms) to splice on the front of each call so you hear the
; first syllable instead of dead air.
pre_roll_ms = 500

; If the carrier drops for less than this many milliseconds during a
; transmission, treat it as the same call and keep recording. Tune up if
; calls keep splitting into pieces, down if separate transmissions get
; glued together.
min_silence_ms = 1500

; ---- Output ----
; Where finalised WAVs land. rdio-scanner's DirWatch should point here
; with type=Default, Auto-populate ON, and mask:
;
;     #DATE_#TIME_#SYSLBL_#TGLBL_#HZ.wav
;
; The directory is created if it doesn't exist (parents included).
output_dir = /home/pi/scanner-calls

; ---- Optional: admin-managed config ----
; If you registered this recorder under Admin -> Recorders in rdio-scanner,
; set server_url to your server and api_key to the value shown there. The
; daemon will then refresh the "soft" settings (enabled, output_dir,
; min_silence_ms, pre_roll_ms) from the server every 30 seconds. Hardware
; settings (serial_port, audio_device) are NEVER overridden remotely.
;
; Leave both unset to run purely from this file.
;server_url = http://192.168.1.10:3000
;api_key =
;refresh_seconds = 30
